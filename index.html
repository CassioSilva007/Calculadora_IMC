<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC</title>
    <style>
         *,::before,::after{margin: 0;padding: 0;box-sizing: border-box;letter-spacing: 0.5px;}
        body{width: 100%;height: 100vh;font-family: Arial, Helvetica, sans-serif;display: flex;align-items: center;justify-content: center;background-image: url(closeup-de-fita-metrica.jpg);object-fit: cover;background-size: 100%;}
        body::before{inset: 0;content: '';width: 100%;height: 100%;background-color:rgba(0, 0, 0, 0.471);position: absolute;z-index: -1;}
        .box{width: 1000px;height: 500px;box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.482);padding: 20px;display: flex;border-radius: 20px;background-color: white;}
        .box>.numeros>h1{margin-bottom: 50px;font-size: 2.4rem;}
        .box>.numeros{display: flex;flex-direction: column;justify-content: center;;width: 100%;}
        .box>.numeros>label{margin: 10px 0px;}
        .box>.numeros>button{margin-top: 20px;width: 65%;padding: 10px;transition: 1s ease-in-out;border: none;margin-left: 50px;}
        .box>.numeros>button:hover{background-color: red;transform: scale(1.05);color: white;box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.482)}
        .box>.numeros>input{width: 95%;padding: 10px;}
        .box>.numeros>p{font-size: 10pt;margin: 10px;}
        .box>img{width: 60%;height: 100%;object-fit: cover;border-radius: 20px;}
    </style>
</head>
<body>
    <div class="box">
        <div class="numeros">
            <h1>Calculadora de IMC</h1>
            <label for="">Digite o seu Peso(kg)</label>
            <input type="number" id="peso" placeholder="Digite o seu peso (kg)" required>
            <label for="">Digite a usa altura em centímetros</label>
            <input type="number" id="altura" placeholder="Digite a sua altura em centímetros" required>
            <button id="calcular" onclick="resultado()">Calcular</button>
            <p id="resultado"></p>
        </div>
        <img src="dados-e-estatisticas-sobre-pessoas-que-praticam-atividade-fisica.jpg" alt="">
    </div>

    <script>
        function resultado() {
            const peso = Number(document.getElementById("peso").value);
            const altura = Number(document.getElementById("altura").value);

            const imc = peso / (altura /100);

            let categoria = '';
            if (imc < 16) {
                categoria = 'Magreza grave';
            } else if (imc >= 16 && imc <= 16.9) {
                categoria = 'Magreza moderada';
            } else if (imc >= 17 && imc <= 18.5) {
                categoria = 'Magreza leve';
            } else if (imc >= 18.6 && imc <= 24.9) {
                categoria = 'Peso ideal';
            } else if (imc >= 25 && imc <= 29.9) {
                categoria = 'Sobrepeso';
            } else if (imc >= 30 && imc <= 34.9) {
                categoria = 'Obesidade grau I';
            } else if (imc >= 35 && imc <= 39.9) {
                categoria = 'Obesidade grau II';
            } else if (imc >= 40) {
                categoria = 'Obesidade grau III';
            }

            document.getElementById("resultado").textContent = `O seu IMC é: ${imc.toFixed(2)} Classificação: ${categoria}` ;

        }
    </script>
</body>
</html>
